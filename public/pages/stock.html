<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AlphaScope — Analysis</title>
<link rel="stylesheet" href="/css/main.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<nav class="nav" id="navbar"></nav>
<div class="stock-page" id="stockPage">
  <div style="display:flex;align-items:center;gap:10px;padding:40px 0;color:var(--c-muted)">
    <div class="spin"></div>
    <div style="font-family:var(--mono);font-size:10px;letter-spacing:.06em">FETCHING LIVE DATA...</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="/js/app.js"></script>
<script>
if (!Auth.requireAuth()) throw 0;

const params  = new URLSearchParams(location.search);
// symbol may be a Yahoo symbol like BTC-USD, GC=F, ^NSEI, or RELIANCE.NS
const SYMBOL  = params.get('symbol') || '';
const NAME    = decodeURIComponent(params.get('name')   || SYMBOL);
const SECTOR  = decodeURIComponent(params.get('sector') || '');

if (!SYMBOL) window.location.href = '/pages/dashboard.html';

let stockData = null, bookmarks = [];

// Currency symbol based on asset type
function priceSymbol(sector) {
  return ['Commodity','Crypto','Forex','Index'].includes(sector) ? '$' : '₹';
}
function formatPrice(price, sector) {
  const sym = priceSymbol(sector);
  if (price > 1000) return sym + price.toLocaleString('en-US', { maximumFractionDigits: 2 });
  if (price > 1)    return sym + price.toFixed(2);
  return sym + price.toFixed(4);
}

async function init() {
  renderNav('');
  document.title = 'AlphaScope — ' + (NAME || SYMBOL);
  bookmarks = await refreshBmCount();
  await loadData();
}

async function loadData() {
  document.getElementById('stockPage').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;padding:40px 0;color:var(--c-muted)">
      <div class="spin"></div>
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:.06em">FETCHING ${SYMBOL}...</div>
    </div>`;

  const res = await apiGet('/analysis?symbol=' + encodeURIComponent(SYMBOL));
  if (!res?.ok) {
    document.getElementById('stockPage').innerHTML = `
      <div style="padding:40px 0;color:var(--c-muted)">
        <div style="font-family:var(--mono);font-size:11px;margin-bottom:6px">⚠ Could not load data for ${SYMBOL}</div>
        <div style="font-size:11px;margin-bottom:16px">${res?.data?.error || 'Yahoo Finance may be temporarily rate-limiting. Try again in a moment.'}</div>
        <button onclick="loadData()" class="btn-base" style="margin-right:8px">↺ Retry</button>
        <a href="/pages/dashboard.html" class="btn-base">← Dashboard</a>
      </div>`;
    return;
  }
  stockData = res.data;
  render(stockData);
}

function render(d) {
  const up  = d.change_pct >= 0;
  const bm  = bookmarks.some(b => b.symbol === d.symbol);
  const sec = d.sector || SECTOR;
  const ps  = priceSymbol(sec);
  const l52 = d.low_52w  || d.price * .78;
  const h52 = d.high_52w || d.price * 1.22;
  const rPos = Math.min(97, Math.max(3, Math.round(((d.price - l52) / (h52 - l52)) * 100)));
  const wr  = Math.round((d.chart_winrate || 0) * 100);
  const cp  = convPct(d.conviction), cc = convColor(d.conviction);

  // market cap formatting
  let mc = '—';
  if (d.market_cap) {
    if (d.market_cap > 1e12) mc = '$' + (d.market_cap/1e12).toFixed(2) + 'T';
    else if (d.market_cap > 1e9) mc = '$' + (d.market_cap/1e9).toFixed(1) + 'B';
    else mc = '$' + (d.market_cap/1e6).toFixed(0) + 'M';
  }

  const patH = (d.chart_patterns || []).map(p => `
    <div style="margin-bottom:10px">
      <div class="pat-name">${p.pattern || p}</div>
      ${d.chart_details ? `<div class="pat-det">${d.chart_details}</div>` : ''}
      <div class="wr-row">
        <div class="wr-lbl">Win rate</div>
        <div class="wr-bg"><div class="wr-fill" style="width:${wr}%"></div></div>
        <div class="wr-pct">${wr}%</div>
      </div>
    </div>`).join('') || '<div style="color:var(--c-muted);font-size:11px">No strong patterns detected in the current timeframe.</div>';

  const evH = (d.radar_events || []).map(e =>
    `<div class="ev-item"><div class="ev-score">+${e.score}</div><div class="ev-desc">${e.desc}</div></div>`
  ).join('') || '<div style="color:var(--c-muted);font-size:11px">No significant events detected.</div>';

  document.getElementById('stockPage').innerHTML = `
    <div style="margin-bottom:14px">
      <a href="/pages/dashboard.html" style="font-family:var(--mono);font-size:9px;color:var(--c-muted);letter-spacing:.08em">← DASHBOARD</a>
    </div>

    <div class="stock-hdr">
      <div>
        <div class="stock-sym">${d.symbol}</div>
        <div class="stock-name">${d.name}</div>
        <span class="d-sector" style="margin-top:5px">${sec}</span>
        ${d.ai_provider ? `<span class="d-sector" style="margin-top:4px;color:var(--c-acc)">${d.ai_provider}</span>` : ''}
      </div>
      <div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:7px">
        <div class="stock-price">${formatPrice(d.price, sec)}</div>
        <div style="font-family:var(--mono);font-size:12px" class="${up ? 'up' : 'dn'}">${up ? '+' : ''}${d.change_pct.toFixed(2)}% today</div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="bm-detail-btn ${bm ? 'on' : ''}" id="bmBtn"
            onclick="toggleBm('${d.symbol}','${d.name.replace(/'/g,"\\'")}','${sec}',${d.price})">${bm ? '★ Saved' : '☆ Save'}</button>
          <span class="conv ${convBadgeClass(d.conviction)}">${d.conviction}</span>
        </div>
      </div>
    </div>

    <div class="meta-grid">
      <div class="meta-cell"><div class="meta-lbl">Prev Close</div><div class="meta-val">${formatPrice(d.prev_close||0, sec)}</div></div>
      <div class="meta-cell"><div class="meta-lbl">52W High</div><div class="meta-val up">${formatPrice(h52, sec)}</div></div>
      <div class="meta-cell"><div class="meta-lbl">52W Low</div><div class="meta-val dn">${formatPrice(l52, sec)}</div></div>
      <div class="meta-cell"><div class="meta-lbl">Market Cap</div><div class="meta-val">${mc}</div></div>
      <div class="meta-cell"><div class="meta-lbl">Radar Score</div><div class="meta-val" style="color:var(--c-acc)">${d.radar_score}/10</div></div>
      <div class="meta-cell"><div class="meta-lbl">Analyzed</div><div class="meta-val" style="font-size:10px">${d.analyzed_at ? new Date(d.analyzed_at).toLocaleTimeString() : '—'}</div></div>
    </div>

    <div class="stock-section">
      <div class="stock-sec-hdr">
        <span>52-Week Range</span>
        <span style="color:var(--c-acc)">${formatPrice(d.price, sec)} current</span>
      </div>
      <div class="stock-sec-body">
        <div class="range-wrap"><div class="range-dot" style="left:${rPos}%"></div></div>
        <div class="range-lbls"><span>${formatPrice(l52, sec)} Low</span><span>${formatPrice(h52, sec)} High</span></div>
      </div>
    </div>

    <div class="stock-section">
      <div class="stock-sec-hdr">
        <span>Price Chart</span>
        <div class="chart-tabs" style="margin:0">
          <button class="c-tab active" onclick="switchChart('price',this)">Price</button>
          <button class="c-tab" onclick="switchChart('rsi',this)">RSI</button>
          <button class="c-tab" onclick="switchChart('volume',this)">Volume</button>
        </div>
      </div>
      <div class="stock-sec-body" style="padding:12px 14px 14px">
        <div style="height:240px;position:relative"><canvas id="stockChart"></canvas></div>
      </div>
    </div>

    <div class="stock-section">
      <div class="stock-sec-hdr">Alpha Conviction</div>
      <div class="stock-sec-body">
        <div style="display:flex;align-items:center;gap:14px">
          <div style="font-family:var(--mono);font-size:8px;color:var(--c-muted);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap">Strength</div>
          <div style="flex:1;height:1px;background:var(--c-faint)">
            <div style="height:1px;background:${cc};width:${cp}%;transition:width 1s ease"></div>
          </div>
          <div style="font-family:var(--mono);font-size:12px;font-weight:600;color:${cc}">${d.conviction}</div>
        </div>
      </div>
    </div>

    <div class="stock-two-col">
      <div class="stc-box">
        <div class="stc-title">Chart Patterns</div>
        ${patH}
      </div>
      <div class="stc-box">
        <div class="stc-title">Opportunity Radar</div>
        ${evH}
        <div style="margin-top:10px;font-family:var(--mono);font-size:10px;color:var(--c-muted)">
          Score <span style="color:var(--c-acc);font-weight:600">${d.radar_score}/10</span>
        </div>
      </div>
    </div>

    <div class="stock-section" style="border-left:2px solid var(--c-acc)">
      <div class="stock-sec-hdr">
        <span class="brief-tag">AI BRIEF</span>
        <span style="font-family:var(--mono);font-size:8px;color:var(--c-muted)">${d.ai_provider || 'Groq'} · ${d.analyzed_at ? new Date(d.analyzed_at).toLocaleTimeString() : ''}</span>
      </div>
      <div class="stock-sec-body">
        <div class="brief-text" style="font-size:13px;line-height:1.85">${d.ai_brief || 'Analysis loading...'}</div>
      </div>
    </div>

    <div style="text-align:center;padding:16px 0 8px;display:flex;align-items:center;justify-content:center;gap:12px">
      <button class="btn-base btn-acc" onclick="loadData()">↺ Refresh Analysis</button>
      <a href="/pages/dashboard.html" class="btn-base">← Dashboard</a>
    </div>`;

  destroyCharts();
  drawChart('stockChart', 'price', d);
}

function switchChart(type, btn) {
  document.querySelectorAll('.c-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (stockData) drawChart('stockChart', type, stockData);
}

async function toggleBm(sym, name, sector, price) {
  const isBm = bookmarks.some(b => b.symbol === sym);
  if (isBm) {
    await apiDel('/bookmarks/' + encodeURIComponent(sym));
    toast(sym + ' removed', 'a');
  } else {
    await apiPost('/bookmarks', { symbol: sym, name, sector, price: Number(price) });
    toast('★ ' + sym + ' saved', 'g');
  }
  bookmarks = await refreshBmCount();
  const btn = document.getElementById('bmBtn');
  if (btn) {
    const on = bookmarks.some(b => b.symbol === sym);
    btn.classList.toggle('on', on);
    btn.textContent = on ? '★ Saved' : '☆ Save';
  }
}

init();
</script>
</body>
</html>
